<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Isola Formativa</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f4f7fb;
    color: #333;
}

header {
    background: #1d4ed8;
    color: white;
    padding: 40px;
    text-align: center;
}

section {
    padding: 30px;
    max-width: 900px;
    margin: auto;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    margin: 15px 0;
}
</style>

</head>

<body>

<header>
<h1>Isola Formativa</h1>
<p>Formazione, crescita e apprendimento</p>
</header>

<section>

<div class="card">
<h2>Chi siamo</h2>
<p>
Un luogo dedicato alla formazione e allo sviluppo delle competenze.
</p>
</div>

<div class="card">
<h2>I nostri corsi</h2>
<p>
Scopri percorsi formativi innovativi.
</p>
</div>

</section>

</body>
</html>
